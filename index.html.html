      { id: "visuales_llama", label: "Reunir visuales: memes + clips + IA", desc: "⚠️ BUSCA LOS MEMES ANTES DE ESCRIBIR EL GUIÓN. Los mejores visuales inspiran los mejores chistes.", minutos: 25, minutosMax: 35, tipo: "investigacion", paralelo: false, bloquea: ["grabar_llama"], tip: "Primera vez: busca efectos de sala de juicio en Freesound.org y guárdalos para siempre." },
      { id: "grabar_llama", label: "Grabar narración (voz en off)", desc: "Sin cámara — voz en off con el avatar de la Llama en pantalla. Tono de juicio burlesco: lento en las partes serias, rápido en los absurdos.", minutos: 30, minutosMax: 35, tipo: "grabacion", paralelo: false, bloquea: ["editar_llama"], tip: "El contraste de ritmo es la clave del humor. Practica el guión en voz alta una vez antes." },

      { id: "publicar_llama", label: "Thumbnail + subir", desc: "Thumbnail obligatorio: Llama-juez con toga mirando a cámara + nombre de la conspiración en rojo.", minutos: 15, minutosMax: 20, tipo: "publicacion", paralelo: false, bloquea: [], tip: "Lo conspirativo + lo absurdo en una imagen. Esa tensión visual es el click." },

      { id: "audio_asmr", label: "Generar audio ASMR con IA", desc: "Crea los sonidos ASMR del personaje con la herramienta elegida. Mínimo 3 variaciones, elige la mejor.", minutos: null, minutosMax: null, tipo: "produccion", paralelo: true, bloquea: ["componer"], tip: "El audio es lo más importante en ASMR. Genera más tiempo del que necesitas." },

const TIPO_COLOR = { grabacion:"#F5A623", edicion:"#00BFA5", guion:"#FF6B6B", decision:"#E040FB", investigacion:"#4A90D9", produccion:"#A8E6CF", publicacion:"#888" };
const TIPO_LABEL = { grabacion:"GRABAR", edicion:"EDITAR", guion:"GUIÓN", decision:"DECIDIR", investigacion:"INVESTIGAR", produccion:"PRODUCIR", publicacion:"PUBLICAR" };

function useStorage(key, defaultValue) {
  const [value, setValue] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : defaultValue; } catch { return defaultValue; }
  });
  useEffect(() => {
    try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
  }, [value, key]);
  return [value, setValue];
}

function Countdown({ totalSeg, onComplete }) {
  const [restante, setRestante] = useState(totalSeg);
  const [activo, setActivo] = useState(false);
  const [empezado, setEmpezado] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    if (activo && restante > 0) {
      ref.current = setInterval(() => setRestante(s => { if (s <= 1) { clearInterval(ref.current); setActivo(false); onComplete?.(); return 0; } return s - 1; }), 1000);
    } else clearInterval(ref.current);
    return () => clearInterval(ref.current);
  }, [activo]);
  const pct = Math.max(0, (restante / totalSeg) * 100);
  const min = Math.floor(restante / 60);
  const seg = restante % 60;
  const urgente = pct < 20;
  const color = urgente ? "#FF4444" : pct < 50 ? "#F5A623" : "#00BFA5";
  return (
    <div style={{ background:"#0a0a0d", border:`1px solid ${color}30`, borderRadius:12, padding:"16px" }}>
      <div style={{ height:6, background:"#1a1a1a", borderRadius:3, marginBottom:14, overflow:"hidden" }}>
        <div style={{ height:"100%", width:`${pct}%`, borderRadius:3, background:color, transition:"width 1s linear, background 0.5s" }} />
      </div>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
        <div style={{ fontFamily:"'Syne',sans-serif", fontWeight:900, fontSize:36, color, letterSpacing:"-1px" }}>
          {String(min).padStart(2,"0")}:{String(seg).padStart(2,"0")}
        </div>
        <div style={{ display:"flex", gap:8 }}>
          {!empezado ? (
            <button onClick={() => { setEmpezado(true); setActivo(true); }} style={{ background:color, color:"#000", border:"none", borderRadius:8, padding:"10px 20px", fontSize:13, cursor:"pointer", fontFamily:"'Syne',sans-serif", fontWeight:800 }}>ARRANCAR</button>
          ) : (
            <>
              <button onClick={() => setActivo(a => !a)} style={{ background:activo?"#1c1c22":color, color:activo?"#666":"#000", border:"none", borderRadius:8, padding:"10px 16px", fontSize:16, cursor:"pointer" }}>{activo?"⏸":"▶"}</button>
              <button onClick={() => { setRestante(totalSeg); setActivo(false); setEmpezado(false); }} style={{ background:"transparent", border:"1px solid #222", color:"#444", borderRadius:8, padding:"10px 14px", fontSize:14, cursor:"pointer" }}>↺</button>
            </>
          )}
        </div>
      </div>
      {urgente && empezado && <div style={{ marginTop:10, fontSize:11, color:"#FF4444", textAlign:"center", fontFamily:"'Syne',sans-serif", fontWeight:800, letterSpacing:"1px" }}>⚡ ÚLTIMOS MINUTOS — TERMINA YA</div>}
    </div>
  );
}

function TareaCard({ t, tiempoDisponible, parcial, tareaSeleccionada, setTareaSeleccionada, playAlarm }) {
  const key = `${t.video.id}-${t.id}`;
  const seleccionada = tareaSeleccionada === key;
  const faltanMin = t.minutos ? t.minutos - tiempoDisponible : 0;
  return (
    <div style={{ background:"#0f0f12", border:`1px solid ${seleccionada?t.video.color:parcial?"#1c1c22":`${t.video.color}25`}`, borderLeft:`3px solid ${parcial?"#2a2a2a":t.video.color}`, borderRadius:9, padding:"13px 14px", opacity:parcial?0.75:1 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:10 }}>
        <div style={{ flex:1 }}>
          <div style={{ fontSize:10, color:parcial?"#555":t.video.color, marginBottom:4 }}>{t.video.emoji} {t.video.nombre}</div>
          <div style={{ fontSize:12, color:"#ddd", marginBottom:5, lineHeight:1.5 }}>{t.label}</div>
          <div style={{ display:"flex", gap:8, flexWrap:"wrap", alignItems:"center" }}>
            <span style={{ fontSize:9, background:`${TIPO_COLOR[t.tipo]}18`, color:TIPO_COLOR[t.tipo], padding:"2px 7px", borderRadius:4 }}>{TIPO_LABEL[t.tipo]}</span>
            {t.minutos ? <span style={{ fontSize:10, color:"#555" }}>⏱ {t.minutos}min tight</span> : <span style={{ fontSize:10, color:"#444", fontStyle:"italic" }}>⏱ tú decides</span>}
            {parcial && t.minutos && <span style={{ fontSize:9, color:"#3a3a3a" }}>+{faltanMin}min más</span>}
          </div>
          {t.tip && <div style={{ marginTop:8, fontSize:10, color:"#444", borderLeft:`2px solid ${t.video.color}40`, paddingLeft:8, lineHeight:1.6 }}>{t.tip}</div>}
          {seleccionada && (
            <div style={{ marginTop:12 }}>
              <Countdown totalSeg={(t.minutos||tiempoDisponible)*60} onComplete={() => playAlarm()} />
              {parcial && <div style={{ marginTop:8, fontSize:10, color:"#555", textAlign:"center" }}>Timer de {tiempoDisponible}min — retoma donde lo dejes</div>}
            </div>
          )}
        </div>
        <button onClick={() => setTareaSeleccionada(seleccionada?null:key)} style={{ background:seleccionada?"transparent":parcial?"#1c1c22":t.video.color, color:seleccionada?"#555":parcial?"#555":"#000", border:`1px solid ${seleccionada?"#333":parcial?"#2a2a2a":t.video.color}`, borderRadius:7, padding:"8px 12px", fontSize:12, cursor:"pointer", flexShrink:0, fontFamily:"'Syne',sans-serif", fontWeight:800 }}>
          {seleccionada?"✕":parcial?"▶ PARCIAL":"▶"}
        </button>
      </div>
    </div>
  );
}

function App() {
  const [videos, setVideos] = useStorage("creator_os_v6", []);
  const [view, setView] = useState("videos");
  const [videoActivo, setVideoActivo] = useState(null);
  const [nuevoNombre, setNuevoNombre] = useState("");
  const [nuevoCanal, setNuevoCanal] = useState("colecciones");
  const [tiempoDisponible, setTiempoDisponible] = useState(30);
  const [modoAccion, setModoAccion] = useState("tiempo");
  const [tareaSeleccionada, setTareaSeleccionada] = useState(null);
  const [contandoId, setContandoId] = useState(null);

  const crearVideo = () => {
    if (!nuevoNombre.trim()) return;
    const r = RUTAS[nuevoCanal];
    const nuevo = { id: Date.now(), nombre: nuevoNombre.trim(), canal: nuevoCanal, color: r.color, emoji: r.emoji, completados: {}, fecha: new Date().toLocaleDateString("es-MX", { day:"numeric", month:"short" }) };
    setVideos(v => [nuevo, ...v]);
    setVideoActivo(nuevo.id);
    setNuevoNombre("");
    setView("ruta");
  };

  const togglePaso = (videoId, pasoId) => setVideos(vs => vs.map(v => v.id !== videoId ? v : { ...v, completados: { ...v.completados, [pasoId]: !v.completados[pasoId] } }));
  const getVideo = id => videos.find(v => v.id === id);

  const getPasoEstado = (video, paso) => {
    if (!video) return "bloqueado";
    if (video.completados[paso.id]) return "done";
    if (paso.paralelo) return "disponible";
    const bloqueadores = RUTAS[video.canal].pasos.filter(p => p.bloquea.includes(paso.id));
    return bloqueadores.every(p => video.completados[p.id]) ? "disponible" : "bloqueado";
  };

  const getTareasDisponibles = (video) => RUTAS[video.canal].pasos.filter(p => getPasoEstado(video, p) === "disponible").sort((a,b) => (a.minutos||999)-(b.minutos||999));
  const getProgreso = (video) => { const p = RUTAS[video.canal].pasos; const done = p.filter(x => video.completados[x.id]).length; return { done, total: p.length, pct: Math.round((done/p.length)*100) }; };

  const playAlarm = () => {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      [0,0.3,0.6].forEach(t => { const o = ctx.createOscillator(); const g = ctx.createGain(); o.connect(g); g.connect(ctx.destination); o.frequency.value = 880; g.gain.setValueAtTime(0.3, ctx.currentTime+t); g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime+t+0.25); o.start(ctx.currentTime+t); o.stop(ctx.currentTime+t+0.25); });
    } catch(e) {}
  };

  const video = videoActivo ? getVideo(videoActivo) : null;
  const ruta = video ? RUTAS[video.canal] : null;

  return (
    <div style={{ minHeight:"100vh", background:"#070709", color:"#e0e0e0", fontFamily:"'DM Mono',monospace" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800;900&display=swap');
        *{box-sizing:border-box;margin:0;padding:0;}
        ::-webkit-scrollbar{width:3px;} ::-webkit-scrollbar-thumb{background:#222;}
        .c{cursor:pointer;transition:all .18s;} .c:hover{opacity:.85;}
        .lift{cursor:pointer;transition:all .18s;} .lift:hover{transform:translateY(-2px);}
        @keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}} .fu{animation:fu .2s ease forwards;}
        input::placeholder{color:#2a2a2a;}
      `}</style>

      <div style={{ position:"sticky", top:0, zIndex:99, background:"#09090b", borderBottom:"1px solid #141418", padding:"13px 18px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
        <div style={{ fontFamily:"'Syne',sans-serif", fontWeight:900, fontSize:16, letterSpacing:"-1px" }}>CREATOR<span style={{ color:video?.color||"#F5A623" }}>_OS</span></div>
        <div style={{ display:"flex", gap:4 }}>
          {[["videos","🎬"],["accion","⚡"]].map(([v,l]) => (
            <button key={v} className="c" onClick={() => setView(v)} style={{ background:view===v||view==="ruta"&&v==="videos"?"#1c1c22":"transparent", border:`1px solid ${view===v?"#2a2a35":"transparent"}`, color:view===v?"#fff":"#444", padding:"5px 12px", borderRadius:6, fontSize:13, cursor:"pointer", fontFamily:"'DM Mono',monospace" }}>{l}</button>
          ))}
        </div>
      </div>

      {view==="videos" && (
        <div style={{ padding:"20px 18px" }} className="fu">
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:18 }}>
            <div><div style={{ fontFamily:"'Syne',sans-serif", fontWeight:900, fontSize:22, color:"#fff" }}>Videos</div><div style={{ fontSize:10, color:"#333", marginTop:2 }}>{videos.length} en producción</div></div>
            <button className="c" onClick={() => setView("nuevo")} style={{ background:"#F5A623", color:"#000", border:"none", borderRadius:8, padding:"10px 16px", fontSize:12, cursor:"pointer", fontFamily:"'Syne',sans-serif", fontWeight:800 }}>+ NUEVO</button>
          </div>
          {videos.length===0 && <div style={{ textAlign:"center", padding:"60px 20px", color:"#1e1e1e" }}><div style={{ fontSize:40, marginBottom:12 }}>🎬</div><div style={{ fontSize:12 }}>Crea tu primer proyecto</div></div>}
          <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
            {videos.map(v => { const prog = getProgreso(v); const disp = getTareasDisponibles(v).length; return (
              <div key={v.id} className="lift" onClick={() => { setVideoActivo(v.id); setView("ruta"); }} style={{ background:"#0f0f12", border:`1px solid ${v.color}20`, borderLeft:`3px solid ${v.color}`, borderRadius:10, padding:"14px 16px" }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:10 }}>
                  <div><div style={{ fontSize:13, color:"#ddd", marginBottom:3 }}>{v.emoji} {v.nombre}</div><div style={{ fontSize:10, color:"#444" }}>{RUTAS[v.canal].nombre} · {v.fecha}</div></div>
                  <div style={{ textAlign:"right" }}><div style={{ fontFamily:"'Syne',sans-serif", fontWeight:900, fontSize:20, color:v.color }}>{prog.pct}%</div><div style={{ fontSize:10, color:"#333" }}>{prog.done}/{prog.total}</div></div>
                </div>
                <div style={{ height:3, background:"#1a1a1a", borderRadius:2, marginBottom:8 }}><div style={{ height:"100%", width:`${prog.pct}%`, background:v.color, borderRadius:2, transition:"width .4s" }} /></div>
                {disp>0 && <div style={{ fontSize:10, color:v.color }}>● {disp} paso{disp>1?"s":""} disponible{disp>1?"s":""} ahora</div>}
                {prog.pct===100 && <div style={{ fontSize:10, color:"#4CAF50" }}>✓ Completado</div>}
              </div>
            ); })}
          </div>
        </div>
      )}

      {view==="nuevo" && (
        <div style={{ padding:"20px 18px" }} className="fu">
          <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:20 }}>
            <button className="c" onClick={() => setView("videos")} style={{ background:"transparent", border:"none", color:"#444", fontSize:18, cursor:"pointer" }}>←</button>
            <div style={{ fontFamily:"'Syne',sans-serif", fontWeight:900, fontSize:20, color:"#fff" }}>Nuevo video</div>
          </div>
          <div style={{ marginBottom:18 }}>
            <div style={{ fontSize:9, color:"#2e2e3a", letterSpacing:"2.5px", marginBottom:10 }}>CANAL</div>
            <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
              {Object.entries(RUTAS).map(([k,r]) => (
                <div key={k} className="lift" onClick={() => setNuevoCanal(k)} style={{ background:nuevoCanal===k?`${r.color}15`:"#0f0f12", border:`1px solid ${nuevoCanal===k?r.color:"#1c1c22"}`, borderRadius:9, padding:"12px 14px", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                  <div><div style={{ fontSize:12, color:nuevoCanal===k?r.color:"#888" }}>{r.emoji} {r.nombre}</div><div style={{ fontSize:10, color:"#333", marginTop:3 }}>{r.pasos.length} pasos</div></div>
                  {nuevoCanal===k && <div style={{ color:r.color }}>✓</div>}
                </div>
              ))}
            </div>
          </div>
          <div style={{ marginBottom:20 }}>
            <div style={{ fontSize:9, color:"#2e2e3a", letterSpacing:"2.5px", marginBottom:10 }}>NOMBRE DEL VIDEO</div>
            <input value={nuevoNombre} onChange={e=>setNuevoNombre(e.target.value)} onKeyDown={e=>e.key==="Enter"&&crearVideo()} placeholder="Ej: Unboxing Looney Tunes #3, Ep01 La Ley Llama..." style={{ width:"100%", background:"#0a0a0d", border:"1px solid #1c1c22", borderRadius:8, padding:"13px 14px", color:"#ddd", fontSize:13, fontFamily:"'DM Mono',monospace" }} />
          </div>
          <button onClick={crearVideo} disabled={!nuevoNombre.trim()} style={{ width:"100%", background:nuevoNombre.trim()?RUTAS[nuevoCanal].color:"#111", color:nuevoNombre.trim()?"#000":"#333", border:"none", borderRadius:10, padding:"15px", fontSize:13, cursor:nuevoNombre.trim()?"pointer":"not-allowed", fontFamily:"'Syne',sans-serif", fontWeight:800 }}>CREAR Y VER RUTA CRÍTICA →</button>
        </div>
      )}

      {view==="ruta" && video && ruta && (
        <div style={{ padding:"20px 18px" }} className="fu">
          <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:14 }}>
            <button className="c" onClick={() => setView("videos")} style={{ background:"transparent", border:"none", color:"#444", fontSize:18, cursor:"pointer" }}>←</button>
            <div><div style={{ fontFamily:"'Syne',sans-serif", fontWeight:900, fontSize:17, color:video.color }}>{video.emoji} {video.nombre}</div><div style={{ fontSize:10, color:"#333" }}>{RUTAS[video.canal].nombre}</div></div>
          </div>
          {(() => { const p=getProgreso(video); return (
            <div style={{ background:"#0d0d10", border:`1px solid ${video.color}20`, borderRadius:9, padding:"12px 14px", marginBottom:16 }}>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:8 }}><div style={{ fontSize:11, color:"#444" }}>Progreso</div><div style={{ fontFamily:"'Syne',sans-serif", fontWeight:900, fontSize:16, color:video.color }}>{p.pct}%</div></div>
              <div style={{ height:4, background:"#1a1a1a", borderRadius:2 }}><div style={{ height:"100%", width:`${p.pct}%`, background:video.color, borderRadius:2, transition:"width .4s" }} /></div>
              <div style={{ fontSize:10, color:"#333", marginTop:6 }}>~{ruta.pasos.filter(p=>!video.completados[p.id]).reduce((a,p)=>a+(p.minutos||0),0)} min restantes estimados</div>
            </div>
          ); })()}
          <div style={{ display:"flex", gap:14, marginBottom:14, flexWrap:"wrap" }}>
            {[["✓","#4CAF50","Completado"],["●",video.color,"Disponible"],["○","#2a2a2a","Bloqueado"]].map(([s,c,l])=>(
              <div key={l} style={{ display:"flex", alignItems:"center", gap:5, fontSize:10, color:"#444" }}><span style={{ color:c }}>{s}</span>{l}</div>
            ))}
          </div>
          <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
            {ruta.pasos.map(paso => {
              const estado = getPasoEstado(video, paso);
              const done = estado==="done"; const disp = estado==="disponible"; const bloq = estado==="bloqueado";
              const activo = contandoId===paso.id;
              return (
                <div key={paso.id} style={{ background:done?"#0d180d":activo?`${video.color}08`:"#0f0f12", border:`1px solid ${done?"#1e3a1e":activo?`${video.color}50`:disp?`${video.color}25`:"#111"}`, borderRadius:9, padding:"13px 14px", opacity:bloq?0.4:1, transition:"all .2s" }}>
                  <div style={{ display:"flex", gap:10, alignItems:"flex-start" }}>
                    <div onClick={()=>!bloq&&togglePaso(video.id,paso.id)} style={{ width:22, height:22, borderRadius:"50%", flexShrink:0, marginTop:1, background:done?"#4CAF50":disp?`${video.color}20`:"#111", border:`2px solid ${done?"#4CAF50":disp?video.color:"#222"}`, cursor:bloq?"default":"pointer", display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, color:done?"#fff":video.color, transition:"all .2s" }}>{done?"✓":bloq?"○":"●"}</div>
                    <div style={{ flex:1 }}>
                      <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:3, flexWrap:"wrap" }}>
                        <span style={{ fontSize:12, color:done?"#444":"#ddd", textDecoration:done?"line-through":"none" }}>{paso.label}</span>
                        {paso.paralelo&&!done&&<span style={{ fontSize:9, background:"#1a1a2a", color:"#4A90D9", padding:"2px 6px", borderRadius:4 }}>PARALELO</span>}
                      </div>
                      <div style={{ fontSize:10, color:"#444", lineHeight:1.6, marginBottom:5 }}>{paso.desc}</div>
                      <div style={{ display:"flex", gap:8, alignItems:"center", flexWrap:"wrap" }}>
                        <span style={{ fontSize:9, background:`${TIPO_COLOR[paso.tipo]}18`, color:TIPO_COLOR[paso.tipo], padding:"2px 7px", borderRadius:4 }}>{TIPO_LABEL[paso.tipo]}</span>
                        {paso.minutos ? <span style={{ fontSize:10, color:"#333" }}>⏱ {paso.minutos}min tight / {paso.minutosMax}min max</span> : <span style={{ fontSize:10, color:"#444", fontStyle:"italic" }}>⏱ tiempo por definir</span>}
                        {paso.soloUnaVez&&<span style={{ fontSize:9, background:"#1a2a1a", color:"#4CAF50", padding:"2px 6px", borderRadius:4 }}>SOLO 1 VEZ</span>}
                        {paso.esExperimento&&<span style={{ fontSize:9, background:"#2a1a2a", color:"#E040FB", padding:"2px 6px", borderRadius:4 }}>EXPERIMENTO</span>}
                      </div>
                      {disp&&paso.tip&&<div style={{ marginTop:8, fontSize:10, color:"#555", borderLeft:`2px solid ${video.color}40`, paddingLeft:9, lineHeight:1.6 }}>{paso.tip}</div>}
                      {activo&&<div style={{ marginTop:12 }}><Countdown totalSeg={paso.minutos*60} onComplete={()=>{ playAlarm(); }} /></div>}
                    </div>
                    {disp&&!done&&paso.minutos&&(
                      <button className="c" onClick={()=>setContandoId(contandoId===paso.id?null:paso.id)} style={{ background:activo?"transparent":`${video.color}20`, border:`1px solid ${video.color}50`, color:video.color, borderRadius:6, padding:"6px 10px", fontSize:12, cursor:"pointer", flexShrink:0 }}>{activo?"✕":"⏱"}</button>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
          <button className="c" onClick={() => { setVideos(v=>v.filter(x=>x.id!==video.id)); setView("videos"); }} style={{ marginTop:24, width:"100%", background:"transparent", border:"1px solid #1e1010", color:"#442222", borderRadius:8, padding:"10px", fontSize:11, cursor:"pointer" }}>Eliminar este proyecto</button>
        </div>
      )}

      {view==="accion" && (
        <div style={{ padding:"20px 18px" }} className="fu">
          <div style={{ fontFamily:"'Syne',sans-serif", fontWeight:900, fontSize:22, color:"#fff", marginBottom:4 }}>⚡ Acción</div>
          <div style={{ fontSize:11, color:"#333", marginBottom:20 }}>¿Cuánto tiempo tienes? Te digo qué hacer ahora mismo.</div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:20 }}>
            {[["tiempo","⏰ Por tiempo","Dices cuántos min tienes"],["tarea","📋 Por tarea","Eliges tarea, app da el timer"]].map(([k,l,d])=>(
              <div key={k} className="lift" onClick={()=>setModoAccion(k)} style={{ background:modoAccion===k?"#1c1c22":"#0f0f12", border:`1px solid ${modoAccion===k?"#3a3a4a":"#1c1c22"}`, borderRadius:9, padding:"12px", cursor:"pointer" }}>
                <div style={{ fontSize:12, color:modoAccion===k?"#fff":"#555", marginBottom:3 }}>{l}</div>
                <div style={{ fontSize:10, color:"#333" }}>{d}</div>
              </div>
            ))}
          </div>
          {videos.length===0 ? (
            <div style={{ textAlign:"center", padding:"40px", color:"#2a2a2a" }}>
              <div style={{ fontSize:11, marginBottom:10 }}>No hay videos en producción</div>
              <button className="c" onClick={()=>setView("nuevo")} style={{ background:"#F5A623", color:"#000", border:"none", borderRadius:7, padding:"10px 18px", fontSize:12, cursor:"pointer", fontFamily:"'Syne',sans-serif", fontWeight:800 }}>+ CREAR VIDEO</button>
            </div>
          ) : modoAccion==="tiempo" ? (
            <div>
              <div style={{ fontSize:9, color:"#2e2e3a", letterSpacing:"2.5px", marginBottom:10 }}>TIEMPO DISPONIBLE AHORA</div>
              <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:20 }}>
                {[5,10,15,20,30,45,60,90,120].map(t=>(
                  <button key={t} className="c" onClick={()=>setTiempoDisponible(t)} style={{ background:tiempoDisponible===t?"#fff":"#0f0f12", color:tiempoDisponible===t?"#000":"#444", border:`1px solid ${tiempoDisponible===t?"#fff":"#1c1c22"}`, borderRadius:6, padding:"8px 14px", fontSize:12, cursor:"pointer", fontFamily:"'DM Mono',monospace", transition:"all .15s" }}>{t}min</button>
                ))}
              </div>
              {(() => {
                const todas = videos.flatMap(v=>getTareasDisponibles(v).map(p=>({...p,video:v})));
                const caben = todas.filter(t=>t.minutos<=tiempoDisponible);
                const parciales = todas.filter(t=>!t.minutos||t.minutos>tiempoDisponible);
                if(todas.length===0) return <div style={{ textAlign:"center", padding:"30px", color:"#2a2a2a", fontSize:11 }}>No hay tareas disponibles aún.</div>;
                return (
                  <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                    {caben.length>0&&<><div style={{ fontSize:9, color:"#2e2e3a", letterSpacing:"2.5px", marginBottom:4 }}>✓ CABEN EN TU TIEMPO</div>{caben.map((t,i)=><TareaCard key={`c-${i}`} t={t} tiempoDisponible={tiempoDisponible} parcial={false} tareaSeleccionada={tareaSeleccionada} setTareaSeleccionada={setTareaSeleccionada} playAlarm={playAlarm} />)}</>}
                    {parciales.length>0&&<><div style={{ fontSize:9, color:"#2e2e3a", letterSpacing:"2.5px", margin:"12px 0 4px" }}>⚡ PUEDES ADELANTARLE</div>{parciales.map((t,i)=><TareaCard key={`p-${i}`} t={t} tiempoDisponible={tiempoDisponible} parcial={true} tareaSeleccionada={tareaSeleccionada} setTareaSeleccionada={setTareaSeleccionada} playAlarm={playAlarm} />)}</>}
                  </div>
                );
              })()}
            </div>
          ) : (
            <div>
              <div style={{ fontSize:9, color:"#2e2e3a", letterSpacing:"2.5px", marginBottom:10 }}>ELIGE UNA TAREA</div>
              <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                {videos.flatMap(v=>getTareasDisponibles(v).map(p=>({...p,video:v}))).map((t,i)=>(
                  <div key={i} style={{ background:"#0f0f12", border:`1px solid ${tareaSeleccionada===`${t.video.id}-${t.id}`?t.video.color:"#1c1c22"}`, borderLeft:`3px solid ${t.video.color}`, borderRadius:9, padding:"13px 14px" }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", gap:10, marginBottom:tareaSeleccionada===`${t.video.id}-${t.id}`?12:0 }}>
                      <div style={{ flex:1 }}>
                        <div style={{ fontSize:10, color:t.video.color, marginBottom:3 }}>{t.video.emoji} {t.video.nombre}</div>
                        <div style={{ fontSize:12, color:"#ddd" }}>{t.label}</div>
                        <div style={{ fontSize:10, color:"#555", marginTop:3 }}>{t.minutos?`⏱ ${t.minutos}min tight · ${t.minutosMax}min max`:"⏱ tú decides el tiempo"}</div>
                      </div>
                      <button className="c" onClick={()=>setTareaSeleccionada(tareaSeleccionada===`${t.video.id}-${t.id}`?null:`${t.video.id}-${t.id}`)} style={{ background:tareaSeleccionada===`${t.video.id}-${t.id}`?"transparent":`${t.video.color}20`, border:`1px solid ${t.video.color}50`, color:t.video.color, borderRadius:6, padding:"6px 12px", fontSize:12, cursor:"pointer", flexShrink:0 }}>{tareaSeleccionada===`${t.video.id}-${t.id}`?"✕":"⏱ START"}</button>
                    </div>
                    {tareaSeleccionada===`${t.video.id}-${t.id}`&&(
                      <div>
                        {t.tip&&<div style={{ fontSize:10, color:"#444", borderLeft:`2px solid ${t.video.color}40`, paddingLeft:9, lineHeight:1.6, marginBottom:12 }}>{t.tip}</div>}
                        {t.minutos&&<Countdown totalSeg={t.minutos*60} onComplete={()=>playAlarm()} />}
                      </div>
                    )}
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
